<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mariquita Tamagotchi</title>
  <style>
    :root {
      --bg-1: #1f3a22;
      --bg-2: #2f5a30;
      --bg-3: #17301b;
      --moss: #2e4c2b;
      --wood: #3b2a1f;
      --border: #4b6a3a;
      --text: #e7e0cf;
      --red: #d11141;
      --dark: #111;
      --leaf: #6ea43f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-family: "Courier New", Courier, monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(120,170,90,0.22) 0%, transparent 40%),
        radial-gradient(circle at 80% 10%, rgba(100,150,80,0.2) 0%, transparent 45%),
        radial-gradient(circle at 60% 70%, rgba(90,130,70,0.15) 0%, transparent 50%),
        linear-gradient(180deg, var(--bg-2), var(--bg-3));
      padding: 24px 12px 40px;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 1px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.5);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items: start;
    }

    @media (min-width: 880px) {
      .layout { grid-template-columns: auto 280px; gap: 24px; }
    }

    .pantalla {
      position: relative;
      width: 320px;
      height: 420px;
      background-color: var(--wood);
      border: 14px solid var(--border);
      border-radius: 38px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.75);
      overflow: hidden;
    }

    .brillo {
      position: absolute;
      inset: 12px;
      border-radius: 26px;
      box-shadow: inset 0 0 24px rgba(255,255,255,0.06);
      pointer-events: none;
    }

    .musgo {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 36%;
      background-color: var(--moss);
      border-top-left-radius: 45%;
      border-top-right-radius: 40%;
      box-shadow: inset 0 10px 20px rgba(0,0,0,0.3);
    }

    .decor {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .hoja {
      position: absolute;
      width: 16px;
      height: 10px;
      background: var(--leaf);
      border-radius: 10px 10px 10px 0;
      box-shadow: inset -2px -2px 0 rgba(0,0,0,0.15);
      opacity: 0.85;
    }

    .hoja::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 12px;
      background: rgba(0,0,0,0.2);
      left: 7px;
      top: -4px;
      transform: rotate(20deg);
    }

    .h1 { top: 40px; left: 36px; transform: rotate(-20deg); }
    .h2 { top: 80px; right: 52px; transform: rotate(12deg); }
    .h3 { top: 140px; left: 76px; transform: rotate(6deg); }
    .h4 { top: 120px; right: 120px; transform: rotate(-10deg); }

    .mariquita {
      position: absolute;
      width: 96px;
      height: 96px;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      transition: transform 0.4s ease;
      cursor: pointer;
      outline: none;
    }

    .mariquita:hover { transform: translate(-50%, -50%) scale(1.05); }

    .cuerpo {
      width: 100%;
      height: 100%;
      background-color: var(--red);
      border-radius: 50%;
      position: relative;
      box-shadow: inset -6px -6px 18px rgba(0,0,0,0.5), 0 10px 15px rgba(0,0,0,0.4);
      transition: all 0.35s ease;
    }

    .cabeza {
      width: 52px;
      height: 28px;
      background-color: var(--dark);
      border-radius: 28px 28px 0 0;
      position: absolute;
      top: -16px;
      left: 22px;
    }

    .antena {
      width: 2px;
      height: 15px;
      background-color: var(--dark);
      position: absolute;
      top: -26px;
    }
    .antena.izq { left: 30px; transform: rotate(-18deg); }
    .antena.der { right: 30px; transform: rotate(18deg); }

    .ojos {
      position: absolute;
      top: 6px;
      left: 11px;
      display: flex;
      gap: 8px;
    }

    .ojo {
      width: 10px;
      height: 10px;
      background: #fff;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
    }

    .pupila {
      width: 4px;
      height: 4px;
      background: #111;
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.08s linear;
    }

    .brillo-ojos {
      position: absolute;
      width: 3px;
      height: 3px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      top: 2px;
      left: 1px;
    }

    .linea-espalda {
      width: 2px;
      height: 100%;
      background-color: var(--dark);
      position: absolute;
      left: 47px;
      transition: all 0.35s ease;
    }

    .punto {
      width: 16px;
      height: 16px;
      background-color: var(--dark);
      border-radius: 50%;
      position: absolute;
    }
    .p1 { top: 22px; left: 14px; }
    .p2 { top: 52px; left: 20px; }
    .p3 { top: 22px; right: 14px; }
    .p4 { top: 52px; right: 20px; }
    .p5 { top: 36px; left: 40px; width: 10px; height: 10px; opacity: 0.9; }

    @keyframes saltar {
      0%, 100% { transform: translate(-50%, -50%); }
      50% { transform: translate(-50%, -85%) scale(1.02); }
    }

    @keyframes sacudir {
      0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
      25% { transform: translate(-50%, -50%) rotate(-12deg); }
      75% { transform: translate(-50%, -50%) rotate(12deg); }
    }

    @keyframes emocion {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      40% { transform: translate(-50%, -50%) scale(1.08); }
    }

    .anim-saltar { animation: saltar 0.6s ease-out; }
    .anim-sacudir { animation: sacudir 0.6s ease-in-out; }
    .anim-emocion { animation: emocion 0.5s ease-in-out; }

    .alas-abiertas .cuerpo {
      transform: scaleX(1.12) scaleY(0.94);
      border-radius: 40%;
    }

    .alas-abiertas .linea-espalda {
      width: 12px;
      left: 42px;
      background-color: #222;
    }

    .panel {
      width: 280px;
      background: rgba(0,0,0,0.35);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.45);
    }

    .panel h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 4px 8px;
      border-radius: 12px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.8rem;
    }

    .stat-val { font-weight: bold; }

    .comida-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .comida {
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 12px;
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      position: relative;
      transition: transform 0.2s, background 0.2s;
    }

    .comida:active { cursor: grabbing; }
    .comida:hover { transform: translateY(-2px); background: rgba(255,255,255,0.1); }

    .comida-item {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      position: relative;
    }

    .item-hoja {
      width: 40px;
      height: 24px;
      background: var(--leaf);
      border-radius: 24px 24px 24px 0;
      box-shadow: inset -3px -3px 0 rgba(0,0,0,0.2);
    }
    .item-hoja::after {
      content: "";
      position: absolute;
      width: 2px;
      height: 20px;
      background: rgba(0,0,0,0.2);
      left: 18px;
      top: 0;
      transform: rotate(18deg);
    }

    .item-pulgon {
      background: #2b2b2b;
      border: 2px solid #111;
      box-shadow: inset 0 0 4px rgba(255,255,255,0.08);
    }
    .item-pulgon::after {
      content: "";
      position: absolute;
      width: 6px;
      height: 6px;
      background: #6bff9c;
      border-radius: 50%;
      top: 6px;
      left: 6px;
    }

    .item-semilla {
      width: 30px;
      height: 30px;
      background: #c2a15b;
      border-radius: 40% 60% 50% 50%;
      box-shadow: inset -3px -3px 0 rgba(0,0,0,0.18);
    }

    .mensaje {
      font-size: 0.95rem;
      font-weight: bold;
      text-align: center;
      min-height: 2em;
      background-color: rgba(0,0,0,0.4);
      padding: 10px 16px;
      border-radius: 10px;
      border: 2px solid var(--border);
      max-width: 320px;
    }

    .drop-hint {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
    }

    .pantalla.drag-over {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.25) inset, 0 16px 40px rgba(0,0,0,0.6);
    }

    .emote {
      position: absolute;
      top: -26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .mostrar-emote { opacity: 1; }

    .hambre {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .hambre-fill {
      height: 100%;
      background: #7aa85a;
      width: 60%;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <h1>Bosque Tamagotchi</h1>

  <div class="layout">
    <div>
      <div class="pantalla" id="pantalla">
        <div class="brillo"></div>
        <div class="decor">
          <div class="hoja h1"></div>
          <div class="hoja h2"></div>
          <div class="hoja h3"></div>
          <div class="hoja h4"></div>
        </div>
        <div class="musgo"></div>

        <div class="mariquita" id="mariquita" role="button" tabindex="0" aria-label="Interactuar con mariquita">
          <div class="emote" id="emote">*</div>
          <div class="antena izq"></div>
          <div class="antena der"></div>
          <div class="cabeza">
            <div class="ojos">
              <div class="ojo"><div class="brillo-ojos"></div><div class="pupila" id="pupila-1"></div></div>
              <div class="ojo"><div class="brillo-ojos"></div><div class="pupila" id="pupila-2"></div></div>
            </div>
          </div>
          <div class="cuerpo" id="cuerpo">
            <div class="linea-espalda"></div>
            <div class="punto p1"></div>
            <div class="punto p2"></div>
            <div class="punto p3"></div>
            <div class="punto p4"></div>
            <div class="punto p5"></div>
          </div>
        </div>
      </div>
      <div class="mensaje" id="mensaje">Dale clic o aliméntala para verla reaccionar.</div>
    </div>

    <div class="panel">
      <h2>Estado</h2>
      <div class="stats">
        <span class="chip">Energía: <span class="stat-val" id="energia">3</span>/5</span>
        <span class="chip">Felicidad: <span class="stat-val" id="felicidad">3</span>/5</span>
      </div>
      <div class="hambre" aria-label="Nivel de hambre">
        <div class="hambre-fill" id="hambre-fill"></div>
      </div>

      <h2>Comida</h2>
      <div class="comida-grid">
        <div class="comida" draggable="true" data-tipo="hoja" aria-label="Hoja">
          <div class="comida-item item-hoja"></div>
        </div>
        <div class="comida" draggable="true" data-tipo="pulgon" aria-label="Pulgon">
          <div class="comida-item item-pulgon"></div>
        </div>
        <div class="comida" draggable="true" data-tipo="semilla" aria-label="Semilla">
          <div class="comida-item item-semilla"></div>
        </div>
      </div>
      <div class="drop-hint">Arrastra la comida hacia la mariquita.</div>
    </div>
  </div>

  <script>
    const mariquita = document.getElementById('mariquita');
    const cuerpo = document.getElementById('cuerpo');
    const mensaje = document.getElementById('mensaje');
    const pantalla = document.getElementById('pantalla');
    const energiaEl = document.getElementById('energia');
    const felicidadEl = document.getElementById('felicidad');
    const hambreFill = document.getElementById('hambre-fill');
    const comidas = document.querySelectorAll('.comida');
    const emote = document.getElementById('emote');
    const pupila1 = document.getElementById('pupila-1');
    const pupila2 = document.getElementById('pupila-2');

    let animando = false;
    let energia = 3;
    let felicidad = 3;
    let hambre = 60;

    function actualizarStats() {
      energiaEl.textContent = energia;
      felicidadEl.textContent = felicidad;
      hambreFill.style.width = `${hambre}%`;
    }

    function subir(valor, max = 5) {
      return Math.min(max, valor + 1);
    }

    function bajar(valor, min = 0) {
      return Math.max(min, valor - 1);
    }

    function mostrarEmote(texto) {
      emote.textContent = texto;
      emote.classList.add('mostrar-emote');
      setTimeout(() => emote.classList.remove('mostrar-emote'), 600);
    }

    function resetearPosicion() {
      mariquita.style.transition = 'transform 0.4s ease';
      mariquita.style.transform = 'translate(-50%, -50%)';
    }

    function moverA(x, y) {
      mariquita.style.transition = 'transform 0.35s ease';
      mariquita.style.transform = `translate(${x}px, ${y}px)`;
    }

    function reaccionRandom() {
      if (animando) return;
      animando = true;

      mariquita.className = 'mariquita';
      cuerpo.classList.remove('alas-abiertas');

      const r = Math.random();
      if (r < 0.4) {
        mariquita.classList.add('anim-saltar');
        mensaje.innerText = 'Salto feliz.';
        mostrarEmote('!');
        setTimeout(() => {
          mariquita.classList.remove('anim-saltar');
          animando = false;
        }, 650);

      } else if (r < 0.7) {
        cuerpo.classList.add('alas-abiertas');
        mensaje.innerText = 'Abre sus alitas.';
        mostrarEmote('~');
        setTimeout(() => {
          cuerpo.classList.remove('alas-abiertas');
          animando = false;
        }, 900);

      } else {
        mariquita.classList.add('anim-sacudir');
        mensaje.innerText = 'Cosquillas.';
        mostrarEmote('*');
        setTimeout(() => {
          mariquita.classList.remove('anim-sacudir');
          animando = false;
        }, 700);
      }
    }

    function moverAleatorio() {
      const rect = pantalla.getBoundingClientRect();
      const minX = rect.left + 60;
      const maxX = rect.right - 60;
      const minY = rect.top + 80;
      const maxY = rect.bottom - 80;
      const x = Math.random() * (maxX - minX) + minX;
      const y = Math.random() * (maxY - minY) + minY;
      const localX = x - rect.left;
      const localY = y - rect.top;

      mariquita.style.transition = 'transform 0.35s ease';
      mariquita.style.transform = `translate(${localX - 48}px, ${localY - 48}px)`;

      setTimeout(() => {
        resetearPosicion();
      }, 900);
    }

    mariquita.addEventListener('click', () => {
      reaccionRandom();
      moverAleatorio();
      hambre = bajar(hambre, 0);
      actualizarStats();
    });

    mariquita.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        reaccionRandom();
        moverAleatorio();
        hambre = bajar(hambre, 0);
        actualizarStats();
      }
    });

    document.addEventListener('mousemove', (e) => {
      const rect = mariquita.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = Math.max(-1, Math.min(1, (e.clientX - cx) / 40));
      const dy = Math.max(-1, Math.min(1, (e.clientY - cy) / 40));
      const tx = dx * 3;
      const ty = dy * 3;
      pupila1.style.transform = `translate(${tx}px, ${ty}px)`;
      pupila2.style.transform = `translate(${tx}px, ${ty}px)`;
    });

    comidas.forEach((comida) => {
      comida.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/plain', comida.dataset.tipo);
        e.dataTransfer.effectAllowed = 'move';
      });
    });

    pantalla.addEventListener('dragover', (e) => {
      e.preventDefault();
      pantalla.classList.add('drag-over');
    });

    pantalla.addEventListener('dragleave', () => {
      pantalla.classList.remove('drag-over');
    });

    pantalla.addEventListener('drop', (e) => {
      e.preventDefault();
      pantalla.classList.remove('drag-over');

      const tipo = e.dataTransfer.getData('text/plain');
      if (!tipo) return;

      if (tipo === 'hoja') {
        energia = subir(energia);
        felicidad = subir(felicidad);
        hambre = Math.min(100, hambre + 25);
        mensaje.innerText = 'Hojitas frescas. Buen aporte.';
        mostrarEmote('^');
      } else if (tipo === 'pulgon') {
        energia = subir(energia);
        felicidad = subir(felicidad);
        hambre = Math.min(100, hambre + 30);
        mensaje.innerText = 'Pulgon crujiente. Delicia.';
        mostrarEmote('!');
      } else if (tipo === 'semilla') {
        energia = subir(energia);
        hambre = Math.min(100, hambre + 18);
        mensaje.innerText = 'Semillita para recargar.';
        mostrarEmote('~');
      }

      cuerpo.classList.add('anim-emocion');
      setTimeout(() => cuerpo.classList.remove('anim-emocion'), 500);
      actualizarStats();
    });

    setInterval(() => {
      hambre = bajar(hambre, 0);
      if (hambre < 30) {
        mensaje.innerText = 'Tiene hambre. Dale algo de comer.';
      }
      actualizarStats();
    }, 9000);

    actualizarStats();
  </script>
</body>
</html>
